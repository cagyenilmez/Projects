<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the Oskisyon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3d5f7 0%, #c8e6f5 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 60px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #6b4fa3;
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .user-info {
            background: rgba(255, 255, 255, 0.7);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            max-width: 450px;
            margin: 100px auto;
        }

        .auth-container h2 {
            color: #6b4fa3;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0d5f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fafbfd;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #9b7ec8;
            background: white;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #9b7ec8 0%, #7aa8d4 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107, 79, 163, 0.3);
        }

        .btn-secondary {
            background: #e8f5e9;
            color: #4caf50;
        }

        .btn-secondary:hover {
            background: #c8e6c9;
        }

        .btn-danger {
            background: #ffebee;
            color: #f44336;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: #ffcdd2;
        }

        .btn-logout {
            background: #fff3e0;
            color: #ff9800;
        }

        .btn-logout:hover {
            background: #ffe0b2;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #777;
        }

        .auth-switch a {
            color: #7aa8d4;
            cursor: pointer;
            text-decoration: underline;
        }

        .controls {
            background: white;
            padding: 25px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .group-buttons {
            display: flex;
            gap: 10px;
        }

        .group-buttons button {
            padding: 10px 20px;
            font-size: 14px;
        }

        .task-form {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row-full {
            grid-column: 1 / -1;
        }

        .tasks-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 300px;
        }

        .task-group {
            margin-bottom: 30px;
        }

        .task-group h3 {
            color: #6b4fa3;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e3d5f7;
        }

        .task-item {
            background: linear-gradient(135deg, #fafbfd 0%, #f5f7fa 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 5px solid;
            transition: all 0.3s;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .task-item.priority-high {
            border-left-color: #ffb3ba;
        }

        .task-item.priority-medium {
            border-left-color: #ffffba;
        }

        .task-item.priority-low {
            border-left-color: #baffc9;
        }

        .task-item.status-done {
            opacity: 0.7;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .task-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .task-title.done {
            text-decoration: line-through;
            color: #999;
        }

        .task-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
            font-size: 0.9em;
            color: #666;
        }

        .task-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-meta-item strong {
            color: #555;
        }

        .priority-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .priority-high {
            background: #ffb3ba;
            color: #8b0000;
        }

        .priority-medium {
            background: #ffffba;
            color: #8b7500;
        }

        .priority-low {
            background: #baffc9;
            color: #006400;
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-todo {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-progress {
            background: #fff3e0;
            color: #f57c00;
        }

        .status-done {
            background: #e8f5e9;
            color: #388e3c;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .task-actions button {
            padding: 6px 14px;
            font-size: 13px;
        }

        .hidden {
            display: none;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }

            .group-buttons {
                width: 100%;
            }

            .group-buttons button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
        <h2 id="authTitle">the Oskisyon'a Hoş Geldiniz</h2>
        <div id="errorMessage" class="error-message hidden"></div>

        <div id="loginForm">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="loginUsername" placeholder="Kullanıcı adınızı girin">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="loginPassword" placeholder="Şifrenizi girin">
            </div>
            <button class="btn btn-primary" onclick="login()">Giriş Yap</button>
            <div class="auth-switch">
                Hesabınız yok mu? <a onclick="showRegister()">Kayıt Ol</a>
            </div>
        </div>

        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="registerUsername" placeholder="Kullanıcı adı seçin">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="registerPassword" placeholder="Şifre oluşturun">
            </div>
            <div class="form-group">
                <label>Şifre Tekrar</label>
                <input type="password" id="registerPasswordConfirm" placeholder="Şifrenizi tekrar girin">
            </div>
            <button class="btn btn-primary" onclick="register()">Kayıt Ol</button>
            <div class="auth-switch">
                Hesabınız var mı? <a onclick="showLogin()">Giriş Yap</a>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="container hidden">
        <div class="header">
            <h1>🎯 the Oskisyon</h1>
        </div>

        <div class="user-info">
            <span>Hoş geldin, <strong id="currentUserDisplay"></strong></span>
            <button class="btn btn-logout" onclick="logout()">Çıkış Yap</button>
        </div>

        <div class="controls">
            <div class="controls-row">
                <h3 style="color: #6b4fa3;">Gösterim</h3>
                <div class="group-buttons">
                    <button class="btn btn-secondary" onclick="groupBy('none')">Gruplamayı Kaldır</button>
                    <button class="btn btn-secondary" onclick="groupBy('created')">Oluşturma Tarihine Göre</button>
                    <button class="btn btn-secondary" onclick="groupBy('deadline')">Deadline'a Göre</button>
                </div>
            </div>
        </div>

        <div class="task-form">
            <h3 style="color: #6b4fa3; margin-bottom: 20px;">Yeni İş Ekle</h3>
            <div class="form-row">
                <div class="form-group form-row-full">
                    <label>İş Adı</label>
                    <input type="text" id="taskName" placeholder="İşin adını girin">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Atanan Kişi</label>
                    <input type="text" id="taskAssignee" placeholder="Kişi adı">
                </div>
                <div class="form-group">
                    <label>Öncelik</label>
                    <select id="taskPriority">
                        <option value="low">Düşük</option>
                        <option value="medium">Orta</option>
                        <option value="high">Yüksek</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="taskDeadline">
                </div>
                <div class="form-group">
                    <label>Statü</label>
                    <select id="taskStatus">
                        <option value="todo">Yapılacak</option>
                        <option value="progress">Başlandı</option>
                        <option value="done">Bitti</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="addTask()">İş Ekle</button>
        </div>

        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state">
                <h3>Henüz iş yok</h3>
                <p>Yukarıdaki formu kullanarak yeni iş ekleyin</p>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let tasks = [];
        let currentGrouping = 'none';

        // Initialize app
        function init() {
            checkAuth();
        }

        // Auth functions
        function checkAuth() {
            const user = localStorage.getItem('oskisyon_currentUser');
            if (user) {
                currentUser = user;
                showApp();
            } else {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            document.getElementById('currentUserDisplay').textContent = currentUser;
            loadTasks();
            renderTasks();
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('authTitle').textContent = 'the Oskisyon\'a Hoş Geldiniz';
            hideError();
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('authTitle').textContent = 'Kayıt Ol';
            hideError();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;

            if (!username || !password) {
                showError('Lütfen tüm alanları doldurun');
                return;
            }

            if (password !== passwordConfirm) {
                showError('Şifreler eşleşmiyor');
                return;
            }

            const users = JSON.parse(localStorage.getItem('oskisyon_users') || '{}');

            if (users[username]) {
                showError('Bu kullanıcı adı zaten kullanılıyor');
                return;
            }

            users[username] = password;
            localStorage.setItem('oskisyon_users', JSON.stringify(users));

            showError('Kayıt başarılı! Şimdi giriş yapabilirsiniz');
            setTimeout(() => {
                showLogin();
                document.getElementById('loginUsername').value = username;
            }, 1500);
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Lütfen kullanıcı adı ve şifre girin');
                return;
            }

            const users = JSON.parse(localStorage.getItem('oskisyon_users') || '{}');

            if (!users[username]) {
                showError('Kullanıcı bulunamadı');
                return;
            }

            if (users[username] !== password) {
                showError('Şifre yanlış');
                return;
            }

            currentUser = username;
            localStorage.setItem('oskisyon_currentUser', username);
            showApp();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('oskisyon_currentUser');
            tasks = [];

            // Clear forms
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';

            showAuth();
            showLogin();
        }

        // Task functions
        function loadTasks() {
            const userTasks = localStorage.getItem(`oskisyon_tasks_${currentUser}`);
            tasks = userTasks ? JSON.parse(userTasks) : [];
        }

        function saveTasks() {
            localStorage.setItem(`oskisyon_tasks_${currentUser}`, JSON.stringify(tasks));
        }

        function addTask() {
            const name = document.getElementById('taskName').value.trim();
            const assignee = document.getElementById('taskAssignee').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const deadline = document.getElementById('taskDeadline').value;
            const status = document.getElementById('taskStatus').value;

            if (!name) {
                alert('Lütfen iş adı girin');
                return;
            }

            const task = {
                id: Date.now(),
                name,
                assignee,
                priority,
                deadline,
                status,
                createdAt: new Date().toISOString().split('T')[0]
            };

            tasks.push(task);
            saveTasks();
            renderTasks();

            // Clear form
            document.getElementById('taskName').value = '';
            document.getElementById('taskAssignee').value = '';
            document.getElementById('taskPriority').value = 'low';
            document.getElementById('taskDeadline').value = '';
            document.getElementById('taskStatus').value = 'todo';
        }

        function deleteTask(id) {
            if (confirm('Bu işi silmek istediğinizden emin misiniz?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
            }
        }

        function updateTaskStatus(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = newStatus;
                saveTasks();
                renderTasks();
            }
        }

        function groupBy(type) {
            currentGrouping = type;
            renderTasks();
        }

        function formatDate(dateString) {
            if (!dateString) return 'Belirtilmemiş';
            const date = new Date(dateString);
            return date.toLocaleDateString('tr-TR');
        }

        function getPriorityText(priority) {
            const map = { low: 'Düşük', medium: 'Orta', high: 'Yüksek' };
            return map[priority] || priority;
        }

        function getStatusText(status) {
            const map = { todo: 'Yapılacak', progress: 'Başlandı', done: 'Bitti' };
            return map[status] || status;
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Henüz iş yok</h3>
                        <p>Yukarıdaki formu kullanarak yeni iş ekleyin</p>
                    </div>
                `;
                return;
            }

            let html = '';

            if (currentGrouping === 'none') {
                html = tasks.map(task => renderTask(task)).join('');
            } else {
                const grouped = {};

                tasks.forEach(task => {
                    const key = currentGrouping === 'created' ? task.createdAt : task.deadline || 'Belirtilmemiş';
                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(task);
                });

                const sortedKeys = Object.keys(grouped).sort();

                sortedKeys.forEach(key => {
                    const groupTitle = currentGrouping === 'created'
                        ? `Oluşturma: ${formatDate(key)}`
                        : `Deadline: ${key === 'Belirtilmemiş' ? key : formatDate(key)}`;

                    html += `
                        <div class="task-group">
                            <h3>${groupTitle}</h3>
                            ${grouped[key].map(task => renderTask(task)).join('')}
                        </div>
                    `;
                });
            }

            container.innerHTML = html;
        }

        function renderTask(task) {
            const statusClass = `status-${task.status}`;
            const priorityClass = `priority-${task.priority}`;
            const titleClass = task.status === 'done' ? 'done' : '';

            return `
                <div class="task-item ${priorityClass} ${statusClass}">
                    <div class="task-header">
                        <div class="task-title ${titleClass}">${task.name}</div>
                        <span class="priority-badge priority-${task.priority}">${getPriorityText(task.priority)}</span>
                    </div>
                    <div>
                        <span class="status-badge status-${task.status}">${getStatusText(task.status)}</span>
                    </div>
                    <div class="task-meta">
                        <div class="task-meta-item">
                            <strong>Atanan:</strong> ${task.assignee || 'Belirtilmemiş'}
                        </div>
                        <div class="task-meta-item">
                            <strong>Deadline:</strong> ${formatDate(task.deadline)}
                        </div>
                        <div class="task-meta-item">
                            <strong>Oluşturma:</strong> ${formatDate(task.createdAt)}
                        </div>
                    </div>
                    <div class="task-actions">
                        ${task.status !== 'todo' ? '' : `<button class="btn btn-secondary" onclick="updateTaskStatus(${task.id}, 'progress')">Başla</button>`}
                        ${task.status !== 'progress' ? '' : `<button class="btn btn-secondary" onclick="updateTaskStatus(${task.id}, 'done')">Tamamla</button>`}
                        ${task.status !== 'done' ? '' : `<button class="btn btn-secondary" onclick="updateTaskStatus(${task.id}, 'todo')">Yeniden Aç</button>`}
                        <button class="btn btn-danger" onclick="deleteTask(${task.id})">Sil</button>
                    </div>
                </div>
            `;
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
